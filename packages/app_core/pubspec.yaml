name: app_core
description: "Shared Riverpod providers: the core handle, session/route state, realtime ticks — the DI spine every feature watches."
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  # Bluetooth Classic (SPP) receipt printing — connection + raw writeBytes only;
  # the ESC/POS bytes come fully rendered from the Rust core.
  permission_handler: ^12.0.0
  print_bluetooth_thermal: ^1.2.2
  rust_bridge: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
