name: rust_bridge
description: Madar POS FFI bridge to madar-core via flutter_rust_bridge, plus domain repositories.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  # Exact version by FRB's design: must equal the codegen CLI and the
  # madar-frb cargo dependency (2.12.0). Upgrade all three together.
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  build_runner: ^2.5.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.0

# FFI plugin: no Dart platform code — Cargokit builds madar-frb per platform
# (android/build.gradle, ios+macos podspecs, windows/CMakeLists.txt).
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
