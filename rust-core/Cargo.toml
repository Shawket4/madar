# Madar POS shared core — Cargo workspace.
#
# `madar-core` is the UniFFI library the Swift + Kotlin apps link against.
# `madar-api` (the openapi-generator output) is generated by tool/generate_api.sh
# and wired into madar-core as of Phase 2 (the typed reqwest client the `net/`
# layer drives). Regenerate with tool/generate_api.sh when the backend spec moves.
# `madar-frb` is the flutter_rust_bridge wrapper the Flutter app links against —
# binding code only, delegating 1:1 to madar-core.
[workspace]
resolver = "2"
members = ["crates/madar-core", "crates/madar-api", "crates/madar-frb"]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "UNLICENSED"
publish = false

[profile.release]
# Smaller, faster native libs for the mobile/desktop artifacts.
lto = true
codegen-units = 1
strip = "debuginfo"

# Profiling: fully release-optimized (inherits LTO + codegen-units=1) but keeps
# symbols so Xcode Instruments / Flutter DevTools attribute native time to real
# core functions instead of bare addresses. Cargokit builds this when the
# Flutter app is compiled in PROFILE mode (see rust_bridge's patched builder).
# Never shipped — the release profile above is what production links.
[profile.profiling]
inherits = "release"
strip = false
debug = "line-tables-only"

[profile.dev]
# Keep dev target dirs small (this machine runs disk-tight, and Cargokit
# duplicates a workspace build per Flutter platform). Backtraces still
# resolve to file:line; only full-fidelity DWARF is dropped.
debug = "line-tables-only"

[profile.dev.package."*"]
# Dependencies don't need debuginfo at all.
debug = false
